shortDescription: A size-tiered mining overhaul with seven asteroid sizes, unique
  sprites, bonus drops, and legendary destinations.
description: "Seven sizes of asteroid \u2014 from pebbles to motherlodes \u2014 re-balanced\
  \ across every system in human space. Every mineral gets the full tier treatment\
  \ with unique sprites, toughness scaling, and secondary bonus drops based on real-world\
  \ geology. Bigger rocks take proportionally more time to crack, and mining weapons\
  \ punch above their weight against the largest asteroids. Eleven legendary mining\
  \ destinations are scattered across human space, each with a bespoke asteroid field\
  \ and a spaceport tip that points the way. A prospector named Dusty Vein haunts\
  \ bars with coordinates to wandering motherlodes on a 12-day rotation. Works with\
  \ existing saves. Story-critical systems left untouched."
